<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - Bharat Kisan</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; color: #333; line-height: 1.6; background: #f9f9f9; }
        h1 { color: #1B5E20; }
        .card { background: #fff; border-radius: 8px; padding: 24px; margin: 20px 0; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        label { display: block; font-weight: 600; margin-top: 16px; margin-bottom: 4px; }
        input, textarea, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        textarea { resize: vertical; min-height: 120px; }
        button { background: #1B5E20; color: #fff; border: none; padding: 12px 24px; border-radius: 6px; font-size: 16px; cursor: pointer; margin-top: 16px; width: 100%; }
        button:hover { background: #2E7D32; }
        .success { display: none; text-align: center; padding: 40px 20px; }
        .success h2 { color: #1B5E20; }
        a { color: #1B5E20; }
    </style>
</head>
<body>
    <h1>🌾 Bharat Kisan — Feedback</h1>

    <div class="card" id="feedbackForm">
        <p>We'd love to hear from you! Your feedback helps us improve Bharat Kisan.</p>
        <form id="form" action="https://formsubmit.co/bharatkisan.support@gmail.com" method="POST">
            <input type="hidden" name="_subject" value="Bharat Kisan App Feedback">
            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" name="_next" value="https://piyushkumar03.github.io/bharat-kisan-privacy/feedback.html?success=true">
            <input type="hidden" name="_template" value="table">

            <label for="name">Name (optional)</label>
            <input type="text" name="name" id="name" placeholder="Your name">

            <label for="email">Email *</label>
            <input type="email" name="email" id="email" placeholder="your@gmail.com" required>

            <label for="type">Feedback Type</label>
            <select name="type" id="type">
                <option value="suggestion">Suggestion</option>
                <option value="bug">Bug Report</option>
                <option value="feature">Feature Request</option>
                <option value="appreciation">Appreciation</option>
                <option value="other">Other</option>
            </select>

            <label for="message">Your Feedback *</label>
            <textarea name="message" id="message" placeholder="Tell us what you think..." required></textarea>

            <button type="submit">Send Feedback</button>
        </form>
    </div>

    <div class="success" id="successMsg">
        <h2>✅ Thank you!</h2>
        <p>Your feedback has been sent successfully. We appreciate your input!</p>
        <p><a href="feedback.html">Send another feedback</a></p>
    </div>

    <p style="text-align:center;"><a href="https://piyushkumar03.github.io/bharat-kisan-privacy/">← Privacy Policy</a></p>

    <script>
        if (window.location.search.includes('success=true')) {
            document.getElementById('feedbackForm').style.display = 'none';
            document.getElementById('successMsg').style.display = 'block';
        }
    </script>
</body>
</html>
